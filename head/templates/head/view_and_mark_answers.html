<!DOCTYPE html>
<html>
<head>
    <title>Evaluate Student Answers</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .question { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .question h3 { margin: 0; }
    </style>
</head>
<body>
    <h2>Evaluate Student Answers</h2>

    <label for="studentId">Enter Student ID:</label>
    <input type="number" id="studentId" required />
    <button onclick="fetchAnswers()">Fetch Answers</button>

    <div id="answersContainer"></div>
    <button onclick="submitMarks()">Submit All Marks</button>

    <script>
        let answers = [];
        let totalMarks = 0;

        function fetchAnswers() {
            const studentId = document.getElementById("studentId").value;
            if (!studentId) return alert("Enter a valid ID");

            fetch(`/student/getStudentAnswers/?id=${studentId}`)
                .then(res => res.json())
                .then(data => {
                    answers = data.answers || [];
                    totalMarks = 0;
                    displayAnswers();
                });
        }

        function displayAnswers() {
            const container = document.getElementById("answersContainer");
            container.innerHTML = "";
            answers.forEach((item, idx) => {
                const div = document.createElement("div");
                div.className = "question";
                div.innerHTML = `
                    <h3>Q${idx + 1}: ${item.question}</h3>
                    <p><strong>Answer:</strong> ${item.answer}</p>
                    <label>Marks:</label>
                    <input type="number" data-id="${item.question_id}" class="marksInput" min="0" />
                `;
                container.appendChild(div);
            });
        }

        function submitMarks() {
            const studentId = document.getElementById("studentId").value;
            const marks = [...document.querySelectorAll(".marksInput")].map(input => parseInt(input.value || 0));
            const total = marks.reduce((sum, m) => sum + m, 0);

            fetch("/student/saveStudentMarks/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: studentId, total_marks: total })
            })
            .then(res => res.json())
            .then(data => {
                alert("Marks saved successfully");
            });
        }
    </script>
</body>
</html>
